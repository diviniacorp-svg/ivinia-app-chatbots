<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Post 01 — Llegamos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital,wght@0,400;1,400&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.post {
  width:1080px; height:1080px;
  background:#09090B;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column;
}
.grid {
  position:absolute; inset:0;
  background-image: linear-gradient(rgba(198,255,61,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(198,255,61,0.04) 1px, transparent 1px);
  background-size:54px 54px;
  z-index:0;
}
.orb {
  position:absolute; border-radius:50%;
  background: radial-gradient(circle, #C6FF3D 0%, transparent 70%);
}
.content { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; padding:72px; }

/* Top strip */
.top-strip {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:auto;
}
.logo {
  font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.14em;
  text-transform:uppercase; color:rgba(198,255,61,0.9);
}
.badge {
  background:rgba(198,255,61,0.1); border:1px solid rgba(198,255,61,0.3);
  border-radius:100px; padding:5px 16px;
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em;
  text-transform:uppercase; color:#C6FF3D;
}

/* Main headline */
.headline-block { display:flex; flex-direction:column; gap:0; }
.num {
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.12em;
  text-transform:uppercase; color:rgba(246,245,242,0.3); margin-bottom:20px;
}
h1 {
  font-family:'DM Serif Display',serif; font-style:italic;
  font-size:112px; line-height:0.92; letter-spacing:-0.04em;
  color:#F6F5F2;
}
h1 em { font-style:normal; color:#C6FF3D; }
.sub {
  margin-top:32px;
  font-family:'DM Serif Display',serif;
  font-size:24px; color:rgba(246,245,242,0.5);
  line-height:1.5; max-width:480px;
}

/* Bottom */
.bottom {
  display:flex; justify-content:space-between; align-items:flex-end;
  margin-top:auto;
}
.tag {
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em;
  text-transform:uppercase; color:rgba(246,245,242,0.25);
}
.handle {
  font-family:'DM Mono',monospace; font-size:14px; letter-spacing:0.08em;
  color:#C6FF3D;
}
</style>
</head>
<body>
<div class="post">
  <div class="grid"></div>
  <div class="orb" style="width:600px;height:600px;top:-200px;right:-150px;opacity:0.07;"></div>
  <div class="orb" style="width:300px;height:300px;bottom:-100px;left:-80px;opacity:0.05;"></div>

  <div class="content">
    <div class="top-strip">
      <div class="logo">DIVINIA — IA para PYMEs</div>
      <div class="badge">San Luis, Argentina ✓</div>
    </div>

    <div class="headline-block" style="margin-top:80px;">
      <div class="num">01 / 09</div>
      <h1>IA para<br/>tu nego<em>cio.</em></h1>
      <p class="sub">El primer sistema de automatización pensado para PYMEs argentinas.</p>
    </div>

    <div class="bottom">
      <div class="tag">Turnero · Chatbot · Contenido · Avatares</div>
      <div class="handle">@divinia.ia</div>
    </div>
  </div>
</div>
</body>
</html>
