<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; }
  .post { width: 1080px; height: 1080px; background: #09090b; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 0; }
  .circle-purple { position: absolute; width: 700px; height: 700px; background: #8B5CF6; border-radius: 50%; top: -200px; right: -180px; opacity: 0.28; filter: blur(80px); }
  .circle-pink { position: absolute; width: 380px; height: 380px; background: #EC4899; border-radius: 50%; bottom: -100px; left: -100px; opacity: 0.22; filter: blur(70px); }
  .badge { display: inline-block; background: rgba(139,92,246,0.12); border: 1.5px solid rgba(139,92,246,0.45); border-radius: 999px; padding: 12px 32px; font-size: 24px; font-weight: 700; color: #8B5CF6; letter-spacing: 0.04em; margin-bottom: 36px; position: relative; z-index: 1; }
  .price-main { font-size: 112px; font-weight: 900; color: #ffffff; letter-spacing: -5px; line-height: 1; text-align: center; position: relative; z-index: 1; }
  .price-main .amount { color: #8B5CF6; }
  .price-period { font-size: 36px; font-weight: 500; color: #a1a1aa; text-align: center; position: relative; z-index: 1; margin-top: 8px; margin-bottom: 20px; }
  .divider { width: 80px; height: 2px; background: linear-gradient(90deg, #8B5CF6, #EC4899); border-radius: 999px; margin: 24px auto; position: relative; z-index: 1; }
  .price-alt { font-size: 36px; font-weight: 700; color: #ffffff; text-align: center; position: relative; z-index: 1; margin-bottom: 40px; }
  .price-alt .pink { color: #EC4899; }
  .features { display: flex; flex-direction: column; gap: 18px; position: relative; z-index: 1; margin-bottom: 44px; align-self: stretch; max-width: 680px; margin-left: auto; margin-right: auto; }
  .feature { display: flex; align-items: center; gap: 18px; font-size: 30px; color: #ffffff; font-weight: 500; }
  .feature .check { color: #10B981; font-size: 26px; flex-shrink: 0; }
  .cta { background: #EC4899; border-radius: 20px; padding: 22px 64px; font-size: 30px; font-weight: 800; color: #ffffff; position: relative; z-index: 1; box-shadow: 0 0 60px rgba(236,72,153,0.35); letter-spacing: -0.5px; }
  .logo { position: absolute; bottom: 52px; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 24px; font-weight: 600; color: rgba(255,255,255,0.45); z-index: 1; }
  .logo .by { font-weight: 400; font-size: 20px; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<div class="post">
  <div class="circle-purple"></div>
  <div class="circle-pink"></div>
  <div class="badge">Sin letra chica</div>
  <div class="price-main"><span class="amount">$43.000</span></div>
  <div class="price-period">por mes · cancelás cuando querés</div>
  <div class="divider"></div>
  <div class="price-alt">O <span class="pink">$100.000</span> una sola vez, para siempre.</div>
  <div class="features">
    <div class="feature"><span class="check">✓</span> Setup completo en 24hs</div>
    <div class="feature"><span class="check">✓</span> Sin permanencia mínima</div>
    <div class="feature"><span class="check">✓</span> Recordatorios automáticos incluidos</div>
    <div class="feature"><span class="check">✓</span> Señas por MercadoPago incluidas</div>
    <div class="feature"><span class="check">✓</span> QR imprimible para tu local</div>
  </div>
  <div class="cta">DM para empezar →</div>
  <div class="logo"><span>◉</span><span>Turnero</span><span class="by">by DIVINIA</span></div>
</div>
</body>
</html>
